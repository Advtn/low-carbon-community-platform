services:
  mysql:
    image: mysql:8.0
    container_name: lowcarbon-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: lowcarbon
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
    volumes:
      - lowcarbon_mysql_data:/var/lib/mysql
      - ./backend/sql/lowcarbon_mysql_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lowcarbon-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/lowcarbon?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
      DB_USERNAME: root
      DB_PASSWORD: 123456
      SERVER_PORT: 8080
      UPLOAD_DIR: /app/uploads
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - lowcarbon_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lowcarbon-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  lowcarbon_mysql_data:
  lowcarbon_uploads:
